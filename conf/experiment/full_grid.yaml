# @package _global_
#
# Full-grid sweep recipe. Use:
#   python src/train.py --multirun +experiment=full_grid
#
# This sweeps:
#   - 6 backbones (gcn, gat, gin, sage, gt, diff) for vanilla and iceberg
#   - cg3 (model knob ignored)
#   - 3 datasets (Cora, CiteSeer, PubMed)
#   - per-class label strategy with budgets {1,3,5,10,20}
#
# To also sweep percentage budgets, run a second multirun with
# label_strategy=percentage and label_strategy.budget=0.005,0.01,...

defaults:
  - override /model: gcn
  - override /method: vanilla
  - override /dataset: cora
  - override /label_strategy: per_class

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      model: gcn,gat,gin,sage,gt,diff
      method: vanilla,iceberg
      dataset: cora,citeseer,pubmed
      label_strategy.budget: 1,3,5,10,20

tensorboard:
  enable: true
